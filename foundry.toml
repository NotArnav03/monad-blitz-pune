[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

# Monad testnet. Used by `forge script ... --rpc-url monad` and
# `forge verify-contract --chain monad-testnet`.
[rpc_endpoints]
monad = "https://testnet-rpc.monad.xyz"

# Sourcify verification (Monad testnet supports Sourcify).
[etherscan]
monad = { key = "unused", url = "https://sourcify-api-monad.blockvision.org", chain = 10143 }
